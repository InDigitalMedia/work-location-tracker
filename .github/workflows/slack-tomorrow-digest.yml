name: Slack Tomorrow Neal Street Digest

on:
  schedule:
    # 15:00 and 16:00 UTC covers 4pm London time in both BST and GMT -- the
    # endpoint itself checks the current London hour and no-ops on the firing
    # that doesn't match, so this never needs editing for daylight saving.
    - cron: '0 15,16 * * 1-5'
  workflow_dispatch:
    inputs:
      force:
        description: 'Bypass the weekday/4pm-London gate and send for real right now'
        type: boolean
        default: false

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Call scheduler endpoint
        run: |
          curl -sS -f --retry 3 --retry-delay 5 --max-time 90 \
            -X POST "https://api-a8uz.onrender.com/internal/slack/tomorrow-digest?force=${{ github.event.inputs.force || 'false' }}" \
            -H "X-Scheduler-Secret: ${{ secrets.SLACK_SCHEDULER_SECRET }}"
